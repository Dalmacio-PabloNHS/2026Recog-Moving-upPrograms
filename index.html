<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dalmacio-Pablo NHS 2026 Portal</title>

<meta property="og:type" content="website">
<meta property="og:url" content="https://Dalmacio-PabloNHS.github.io/2026Recog-Moving-upPrograms/">
<meta property="og:title" content="🎓 Dalmacio-Pablo NHS 2026: Programs Portal">
<meta property="og:description" content="🎉 Congratulations! Click to view your program copies! 🦅✨">


<style>

/* ===== GRADIENT BACKGROUND ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
    overflow-x: hidden;

    background: linear-gradient(-45deg, #0d1b2a, #1b263b, #415a77, #1b263b);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ===== STARS ===== */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.stars::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    box-shadow:
        50px 80px white,
        150px 200px white,
        300px 120px white,
        500px 250px white,
        700px 90px white,
        900px 300px white,
        1200px 150px white,
        1500px 220px white;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

/* ===== FIREWORKS ===== */
.firework {
    position: fixed;
    width: 5px;
    height: 5px;
    background: gold;
    border-radius: 50%;
    animation: explode 1.5s infinite ease-out;
    z-index: 0;
}

.firework:nth-child(1) { top: 20%; left: 30%; }
.firework:nth-child(2) { top: 40%; left: 70%; animation-delay: .5s; }
.firework:nth-child(3) { top: 70%; left: 50%; animation-delay: 1s; }

@keyframes explode {
    0% { box-shadow: 0 0 gold; opacity:1; }
    100% {
        box-shadow:
        0 -40px gold,
        40px 0 gold,
        -40px 0 gold,
        0 40px gold;
        opacity:0;
    }
}

/* ===== HEADER ===== */
header {
    text-align: center;
    padding: 50px 20px 30px;
    position: relative;
    z-index: 1;
}

header h1 {
    font-size: 2rem;
}

.theme-box {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
}

/* ===== CONTENT ===== */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
    position: relative;
    z-index: 1;
}

.section-title {
    text-align: center;
    font-size: 1.6rem;
    margin: 30px 0;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
}

.card {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    overflow: hidden;
    text-decoration: none;
    color: white;
    backdrop-filter: blur(12px);
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-12px) scale(1.03);
}

/* ===== FIX PORTRAIT IMAGE (NO CROP) ===== */
.card-img {
    height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.3);
}

.card-img img {
    max-height: 100%;
    max-width: 100%;
    object-fit: contain; /* IMPORTANT FIX */
}

.title-box {
    padding: 18px;
    text-align: center;
}

.title-box span {
    color: #ffd54f;
    font-weight: bold;
}

.footer {
    text-align: center;
    padding: 40px;
    font-size: 0.85rem;
    opacity: 0.8;
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>

<header>
    <h1>Dalmacio-Pablo National High School</h1>

    <div class="theme-box">
        <a href="https://heyzine.com/flip-book/34040203eb.html" style="color:white;text-decoration:none;">
        <i>"Filipino Graduates: Prepared to Lead with <b style="color:#ffd54f">Competence</b> and <b style="color:#ffd54f">Character</b>"</i>
        </a>
    </div>
</header>

<div class="container">
    <h3 class="section-title">✨ 2026 Recognition & Moving-Up Programs ✨</h3>

    <div class="grid">

        <a href="Recognition.html" class="card">
            <div class="card-img">
                <img src="DalRecog.PNG" alt="Recognition Program">
            </div>
            <div class="title-box">
                <span>Recognition</span>
                <h2>Program</h2>
            </div>
        </a>

        <a href="Completion.html" class="card">
            <div class="card-img">
                <img src="DalMove.PNG" alt="Graduation Program">
            </div>
            <div class="title-box">
                <span>Moving-Up</span>
                <h2>Program</h2>
            </div>
        </a>

    </div>
</div>

<div class="footer">
    🎓 Congratulations Graduates of 2026 🎓
</div>

</body>
</html>
